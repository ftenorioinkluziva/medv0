top_issues:
  - id: 'QA-1.1-001'
    severity: low
    title: 'GeistMono.variable ausente do className do <html>'
    description: >
      GeistMono.variable é aplicado apenas no <body>, não no <html>.
      A utility font-mono pode não funcionar em contextos que dependem da variável
      CSS no elemento raiz. Impacto mínimo — padrão atual é font-sans.
    file: 'src/app/layout.tsx:27-28'
    suggested_fix: >
      Adicionar GeistMono.variable ao cn() no <html> para consistência:
      className={cn('dark', 'font-sans', GeistSans.variable, GeistMono.variable)}
    suggested_owner: dev

  - id: 'QA-1.1-002'
    severity: low
    title: 'suppressHydrationWarning no <html> suprime avisos legítimos'
    description: >
      suppressHydrationWarning no elemento html silencia hydration warnings para o
      elemento raiz e seus atributos. É uma prática comum para dark mode com className
      server-side, mas pode mascarar outros problemas de hydration no layout raiz.
    file: 'src/app/layout.tsx:27'
    suggested_fix: >
      Manter como está — é a abordagem recomendada para dark mode com Tailwind.
      Apenas documentar que é intencional.
    suggested_owner: dev

