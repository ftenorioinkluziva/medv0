top_issues:
  - id: 'QA-1.4-001'
    severity: medium
    title: 'smokingDetails sem input na UI (AC3 gap)'
    description: >
      O campo smokingDetails está em AC1 (schema), Zod schema (.nullish()), e no submit
      handler (profile-form.tsx L64: smokingDetails: (fd.get('smokingDetails') as string) || undefined),
      mas nenhum <input name="smokingDetails"> existe no AdvancedForm. O campo sempre
      submete undefined — usuário não consegue preencher detalhes de tabagismo via UI.
    file: 'src/app/app/profile/advanced-form.tsx'
    suggested_fix: >
      Adicionar após o select de smokingStatus na seção Hábitos:
        <div className="space-y-1">
          <Label htmlFor="smokingDetails">Detalhes de tabagismo</Label>
          <Input id="smokingDetails" name="smokingDetails"
            defaultValue={initialData?.smokingDetails ?? ''}
            placeholder="Ex: 10 cigarros/dia, parou há 5 anos" />
        </div>
    suggested_owner: dev

  - id: 'QA-1.4-002'
    severity: low
    title: 'key={index} na lista de atividades físicas'
    description: >
      advanced-form.tsx L219 usa key={index} no map de atividades. Se o usuário
      remove uma atividade do meio da lista, React pode não atualizar corretamente
      os inputs controlados das atividades seguintes, causando drift de estado.
    file: 'src/app/app/profile/advanced-form.tsx'
    suggested_fix: >
      Adicionar campo id à interface ExerciseActivity e ao emptyActivity():
        const emptyActivity = (): ExerciseActivity & { id: string } => ({
          id: crypto.randomUUID(), type: '', frequency: 3, duration: 30, intensity: 'moderada'
        })
      E usar key={activity.id} no map.
    suggested_owner: dev

  - id: 'QA-1.4-003'
    severity: low
    title: 'exerciseFrequency/Duration/Intensity no submit handler sem UI correspondente'
    description: >
      profile-form.tsx L70-72 envia exerciseFrequency, exerciseDuration, exerciseIntensity
      via fd.get() mas não existem inputs com esses names no formulário. Sempre undefined.
      Campos marcados como "legado" na story — considerar remover do handler ou documentar.
    file: 'src/app/app/profile/profile-form.tsx'
    suggested_fix: >
      Opção 1: Remover as linhas L70-72 do submit handler (campos nunca populados).
      Opção 2: Documentar como legado mantido por compatibilidade de schema.
    suggested_owner: dev

