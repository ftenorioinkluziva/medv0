schema: 1
story: '1.3'
story_title: 'Medical Profile (Dados Básicos)'
gate: CONCERNS
status_reason: >
  Todos os 5 ACs implementados, lint/typecheck limpos, 11/11 testes passando.
  Gate CONCERNS por dois pontos MEDIUM: ausência de validação cruzada sistólica > diastólica,
  e campos opcionais de texto salvando string vazia ("") em vez de null no banco.
reviewer: 'Quinn (Test Architect)'
updated: '2026-03-24T21:04:00Z'

quality_score: 80
expires: '2026-04-07T21:04:00Z'

top_issues:
  - id: 'QA-1.3-001'
    severity: medium
    title: 'Sem validação cruzada systolicPressure > diastolicPressure'
    description: >
      O Zod schema valida min(1) para ambos, mas não verifica que sistólica > diastólica.
      Usuário pode submeter sistólica=70, diastólica=120 sem erro.
    file: 'src/lib/actions/medical-profile.ts'
    suggested_fix: >
      Adicionar .refine() no schema Zod:
      .refine(data => data.systolicPressure > data.diastolicPressure,
        { message: 'Pressão sistólica deve ser maior que diastólica', path: ['systolicPressure'] })
    suggested_owner: dev

  - id: 'QA-1.3-002'
    severity: medium
    title: 'Campos opcionais de texto salvam "" em vez de null'
    description: >
      familyHistory e notes no form handler usam String(fd.get(...) ?? '') que converte
      null/ausente em string vazia. O banco armazena "" em coluna nullable em vez de NULL.
      Impacta queries que filtram por IS NULL e consistência dos dados.
    file: 'src/app/app/profile/profile-form.tsx'
    suggested_fix: >
      Substituir String(fd.get('familyHistory') ?? '') por
      (fd.get('familyHistory') as string || undefined) para passar undefined quando vazio,
      deixando Zod .optional() tratar como nullish.
    suggested_owner: dev

  - id: 'QA-1.3-003'
    severity: low
    title: 'Sem limite superior nas validações de pressão arterial'
    description: 'systolicPressure e diastolicPressure têm apenas min(1). Sem max().'
    file: 'src/lib/actions/medical-profile.ts'
    suggested_fix: 'Adicionar .max(300) para sistólica e .max(200) para diastólica'
    suggested_owner: dev

  - id: 'QA-1.3-004'
    severity: low
    title: 'updatedAt: new Date() duplicado no insert.values()'
    description: >
      updatedAt é definido tanto em insert.values() quanto em onConflictDoUpdate.set().
      O schema já tem defaultNow() para insert, tornando o primeiro redundante.
    file: 'src/lib/actions/medical-profile.ts'
    suggested_owner: dev

  - id: 'QA-1.3-005'
    severity: low
    title: 'Toast sem aria-live para acessibilidade'
    description: 'Div de toast tem role="status" mas falta aria-live="polite"'
    file: 'src/app/app/profile/profile-form.tsx'
    suggested_owner: dev

