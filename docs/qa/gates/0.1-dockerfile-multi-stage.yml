top_issues:
  - id: 'QA-0.1-001'
    severity: medium
    title: 'DATABASE_URL como build ARG com placeholder pode causar falha silenciosa'
    description: >
      O builder injeta DATABASE_URL via ARG com default placeholder
      (postgresql://localhost:5432/placeholder). Se NextAuth config ou qualquer
      import de módulo tenta conectar ao DB em build time e o caller não passar
      --build-arg DATABASE_URL=..., o build pode falhar ou gerar artefato
      mal-configurado. Documentar que --build-arg é obrigatório em CI ou
      garantir que nenhum módulo conecta ao DB em build time.
    file: 'Dockerfile'
    line: '14-15'
    suggested_fix: >
      Opção 1: documentar no README que DATABASE_URL deve ser passado via
      --build-arg em CI (ex: docker build --build-arg DATABASE_URL=$DB_URL .).
      Opção 2: remover ARG DATABASE_URL se o build não necessita de conexão real
      (verificar se NextAuth/Drizzle conectam em build time).
    suggested_owner: dev

  - id: 'QA-0.1-002'
    severity: medium
    title: 'AC6 não verificado — sem CI checks na branch'
    description: >
      Nenhum CI check reportado na branch copilot/create-multi-stage-dockerfile.
      O PR body menciona que Copilot teve falha de build (firewall fonts.googleapis.com)
      e corrigiu removendo o Google Font. Não há evidência de build Docker bem-sucedido
      nem de container subindo e respondendo na porta 3000.
    suggested_fix: >
      Executar localmente: docker build -t sami:local . && docker run -p 3000:3000
      --env-file .env.local sami:local e validar resposta em http://localhost:3000.
      Documentar resultado (docker images para tamanho, screenshot ou curl da resposta).
    suggested_owner: dev

  - id: 'QA-0.1-003'
    severity: low
    title: 'pnpm@9 sem versão exata pinada'
    description: >
      corepack prepare pnpm@9 --activate instala o latest pnpm 9.x no momento do build,
      quebrando reprodutibilidade caso uma versão minor introduza breaking change.
    file: 'Dockerfile'
    suggested_fix: >
      Usar versão exata: corepack prepare pnpm@9.15.4 --activate (ou a versão atual).
      Alternativa: adicionar "packageManager": "pnpm@9.x.x" em package.json e usar
      corepack enable sem prepare explícito.
    suggested_owner: dev

  - id: 'QA-0.1-004'
    severity: low
    title: 'Sem HEALTHCHECK no Dockerfile'
    description: >
      Boa prática para containers de produção. Sem HEALTHCHECK, orquestradores
      (Docker Compose, Kubernetes) não conseguem detectar app unhealthy automaticamente.
    file: 'Dockerfile'
    suggested_fix: |
      Adicionar antes do CMD:
      HEALTHCHECK --interval=30s --timeout=3s --start-period=10s \
        CMD wget -qO- http://localhost:3000/ || exit 1
    suggested_owner: dev

  - id: 'QA-0.1-005'
    severity: low
    title: 'Story file docs/stories/0.1.story.md ausente'
    description: >
      Não existe arquivo de story para esta issue. Processo AIOX requer story file
      com File List e Change Log para rastreabilidade.
    suggested_fix: 'Criar docs/stories/0.1.story.md com File List dos arquivos do PR'
    suggested_owner: dev

