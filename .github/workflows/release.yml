name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-placeholder-secret-32chars-min
      NEXTAUTH_URL: http://localhost:3000
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY || 'ci-placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Generate changelog
        run: |
          echo "## What's New in v${{ steps.version.outputs.version }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "### Features" >> RELEASE_NOTES.md
            git log --pretty=format:"* %s (%h)" $LAST_TAG..HEAD | grep -E "^\* feat" >> RELEASE_NOTES.md || echo "* No new features" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "### Bug Fixes" >> RELEASE_NOTES.md
            git log --pretty=format:"* %s (%h)" $LAST_TAG..HEAD | grep -E "^\* fix" >> RELEASE_NOTES.md || echo "* No bug fixes" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "### Other" >> RELEASE_NOTES.md
            git log --pretty=format:"* %s (%h)" $LAST_TAG..HEAD | grep -vE "^\* (feat|fix)" >> RELEASE_NOTES.md || true
          else
            echo "### Initial Release" >> RELEASE_NOTES.md
            git log --pretty=format:"* %s (%h)" --max-count=20 >> RELEASE_NOTES.md
          fi
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "SAMI ${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag

  notify:
    name: Notify
    needs: create-release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          if [ "${{ needs.create-release.result }}" = "success" ]; then
            echo "🎉 Release ${{ github.ref_name }} created!"
            echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          else
            echo "❌ Release failed"
            exit 1
          fi
